<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Story - BACKChain Lite</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <img src="assets/images/logo.png" alt="BACKChain Lite Logo" height="30">
                BACKChain Lite
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" href="my-story.html">My Story</a></li>
                    <li class="nav-item"><a class="nav-link" href="my-goals.html">30 Days of BACK</a></li>
                    <li class="nav-item"><a class="nav-link" href="gofundme.html">GoFundMe</a></li>
                    <li class="nav-item"><a class="nav-link" href="skill-swap.html">Skill Swap</a></li>
                    <li class="nav-item"><a class="nav-link" href="barter-board.html">Barter Board</a></li>
                    <li class="nav-item"><a class="nav-link" href="back-up-board.html">BACK Up Board</a></li>
                    <li class="nav-item"><a class="nav-link" href="burn-wall.html">Burn Wall</a></li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="profile.html">Profile</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" id="loginBtn">Login</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container my-5">
        <section class="text-center py-4">
            <h1>📖 My Story</h1>
            <p class="lead">Share your journey of resilience and reclaim your value.</p>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addStoryModal">Share Your Story</button>
        </section>

        <!-- Stories Grid -->
        <section class="py-4">
            <div class="row" id="storiesGrid">
                <!-- Stories will be loaded here via JavaScript -->
            </div>
        </section>
    </main>

    <!-- Add Story Modal -->
    <div class="modal fade" id="addStoryModal" tabindex="-1" aria-labelledby="addStoryModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="addStoryModalLabel">Share Your Story</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="storyForm">
                        <div class="mb-3">
                            <label for="storyTitle" class="form-label">Title</label>
                            <input type="text" class="form-control" id="storyTitle" required>
                        </div>
                        <div class="mb-3">
                            <label for="storyDescription" class="form-label">Your Story</label>
                            <textarea class="form-control" id="storyDescription" rows="3" required></textarea>
                        </div>
                        <div class="mb-3">
                            <label for="storyCategory" class="form-label">Category</label>
                            <select class="form-select" id="storyCategory" required>
                                <option value="Career">Career</option>
                                <option value="Health">Health</option>
                                <option value="Finance">Finance</option>
                                <option value="Personal">Personal</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-primary" id="submitStoryBtn">Submit Story</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-dark text-white py-4">
        <div class="container text-center">
            <p>&copy; 2026 BACKChain Lite. All rights reserved.</p>
        </div>
    </footer>

    <!-- Firebase and Custom JS -->
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-firestore-compat.js"></script>
    <script src="assets/js/firebase-config.js"></script>
    <script src="assets/js/main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
