<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Story - $BACK</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Oswald:wght@400;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="bg-black text-light">
    <!-- Navigation Bar (Same as index.html) -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-black border-bottom border-gold">
        <!-- Navbar content here -->
    </nav>

    <!-- Main Content -->
    <main class="container my-5">
        <section class="text-center py-4">
            <h1 class="display-4 gold-text fw-bold mb-4">📖 My Story</h1>
            <p class="lead fs-5 mb-5">
                Every man has a story. This is where you tell yours. No judgment. No pity. Just respect.
            </p>
            <button class="btn btn-gold" data-bs-toggle="modal" data-bs-target="#addStoryModal">Share Your Story</button>
        </section>

        <!-- Stories Grid -->
        <section class="py-4">
            <div class="row" id="storiesGrid">
                <!-- Stories will be loaded here via JavaScript -->
            </div>
        </section>
    </main>

    <!-- Add Story Modal -->
    <div class="modal fade" id="addStoryModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-dark text-light">
                <div class="modal-header border-bottom border-gold">
                    <h5 class="modal-title gold-text">Share Your Story</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="storyForm">
                        <div class="mb-3">
                            <label for="storyTitle" class="form-label gold-text">Title</label>
                            <input type="text" class="form-control bg-dark text-light border-gold" id="storyTitle" required>
                        </div>
                        <div class="mb-3">
                            <label for="storyDescription" class="form-label gold-text">Your Story</label>
                            <textarea class="form-control bg-dark text-light border-gold" id="storyDescription" rows="5" required></textarea>
                        </div>
                        <div class="mb-3">
                            <label for="storyCategory" class="form-label gold-text">Category</label>
                            <select class="form-select bg-dark text-light border-gold" id="storyCategory" required>
                                <option value="Career" class="bg-dark">Career</option>
                                <option value="Health" class="bg-dark">Health</option>
                                <option value="Finance" class="bg-dark">Finance</option>
                                <option value="Personal" class="bg-dark">Personal</option>
                            </select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer border-top border-gold">
                    <button type="button" class="btn btn-outline-gold" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-gold" id="submitStoryBtn">Submit Story</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer (Same as index.html) -->
    <footer class="bg-black text-white py-4 border-top border-gold">
        <!-- Footer content here -->
    </footer>

    <!-- Firebase and Custom JS -->
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-firestore-compat.js"></script>
    <script src="assets/js/firebase-config.js"></script>
    <script src="assets/js/main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
