<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skill Swap - BACKChain Lite</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <img src="assets/images/logo.png" alt="BACKChain Lite Logo" height="30">
                BACKChain Lite
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="my-story.html">My Story</a></li>
                    <li class="nav-item"><a class="nav-link" href="my-goals.html">30 Days of BACK</a></li>
                    <li class="nav-item"><a class="nav-link" href="gofundme.html">GoFundMe</a></li>
                    <li class="nav-item"><a class="nav-link active" href="skill-swap.html">Skill Swap</a></li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="profile.html">Profile</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" id="loginBtn">Login</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container my-5">
        <section class="text-center py-4">
            <h1>🔄 Skill Swap Board</h1>
            <p class="lead">Trade skills with other BACK holders.</p>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addSkillModal">Add a Skill</button>
        </section>

        <!-- Skills Grid -->
        <section class="py-4">
            <div class="row" id="skillsGrid">
                <!-- Skills will be loaded here via JavaScript -->
            </div>
        </section>
    </main>

    <!-- Add Skill Modal -->
    <div class="modal fade" id="addSkillModal" tabindex="-1" aria-labelledby="addSkillModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="addSkillModalLabel">Add a Skill</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="skillForm">
                        <div class="mb-3">
                            <label for="skillTitle" class="form-label">Title</label>
                            <input type="text" class="form-control" id="skillTitle" required>
                        </div>
                        <div class="mb-3">
                            <label for="skillDescription" class="form-label">Description</label>
                            <textarea class="form-control" id="skillDescription" rows="3" required></textarea>
                        </div>
                        <div class="mb-3">
                            <label for="skillCost" class="form-label">BACK Cost</label>
                            <input type="number" class="form-control" id="skillCost" required>
                        </div>
                        <div class="mb-3">
                            <label for="skillCategory" class="form-label">Category</label>
                            <select class="form-select" id="skillCategory" required>
                                <option value="Design">Design</option>
                                <option value="Coding">Coding</option>
                                <option value="Writing">Writing</option>
                                <option value="Marketing">Marketing</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-primary" id="submitSkillBtn">Submit Skill</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-dark text-white py-4">
        <div class="container text-center">
            <p>&copy; 2026 BACKChain Lite. All rights reserved.</p>
        </div>
    </footer>

    <!-- Firebase and Custom JS -->
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-firestore-compat.js"></script>
    <script src="assets/js/firebase-config.js"></script>
    <script src="assets/js/main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
